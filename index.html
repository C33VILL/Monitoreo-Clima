<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador Geográfico Profesional</title>
  <!-- Hoja de estilos -->
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <h1>🌍 Localizador Geográfico Global🌍 </h1>
    <p>
      Consumo de API OpenStreetMap con control de versiones integral.
      <br>
      Centeno Villavicencio Uriel IRIC-91
    </p>
  </header>
  <main>
    <!-- Buscador -->
    <div class="search-container">
      <input type="text" id="city-input" placeholder="Introduce un lugar (Ej. Lerma, Toluca, Madrid...)">
      <button id="search-btn">
        Consultar API
      </button>
    </div>
    <!-- Información -->
    <div id="weather-card" class="weather-card">
      <p>
        Introduce una ubicación
      </p>
    </div>
    <!-- Mapa -->


    <div id="map"></div>
  </main>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- JavaScript -->
  <script src="app.js"></script>
</body>

</html>
